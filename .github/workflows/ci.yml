name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  build-gate:
    name: Build Gate
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: nixos
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build all derivations
        run: >-
          nix build --quiet
          .#checks.x86_64-linux.library
          .#checks.x86_64-linux.exe
          .#checks.x86_64-linux.tests
          .#checks.x86_64-linux.lint
          .#devShells.x86_64-linux.default.inputDerivation

  tests:
    name: Tests
    needs: build-gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Run tests
        run: nix run --quiet .#tests

  lint:
    name: Lint
    needs: build-gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Run lint
        run: nix run --quiet .#lint

  docs:
    name: Docs (strict build + PR preview)
    needs: build-gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build docs
        run: nix develop --quiet -c just build-docs

      - name: Publish PR preview
        if: github.event_name == 'pull_request'
        uses: paolino/dev-assets/static-preview@main
        with:
          path: site
          comment-marker: "<!-- docs-preview-url -->"

  pr-preview-cleanup:
    name: Remove PR Preview
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: nixos
    steps:
      - uses: paolino/dev-assets/static-preview@main
        with:
          mode: cleanup
