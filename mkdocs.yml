site_name: haskell-gamechanger
site_description: Haskell client for the GameChanger Cardano wallet
site_url: https://lambdasistemi.github.io/haskell-gamechanger/
repo_url: https://github.com/lambdasistemi/haskell-gamechanger
repo_name: lambdasistemi/haskell-gamechanger

theme:
  name: material
  palette:
    scheme: slate
  features:
    - navigation.indexes
    - navigation.sections
    - navigation.path
    - toc.integrate
    - content.code.copy

nav:
  - Overview: index.md
  - Protocol: protocol.md
  - Integration: integration.md
  - Security: security.md
  - Ontology: ontology.md

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - footnotes
  - def_list
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
